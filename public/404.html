<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>AV Player</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      const path = location.pathname.replace(/\/$/, '');
      const firstSegment = path.split('/').filter(Boolean)[0];
      const base = firstSegment && !path.endsWith('/404.html') ? `/${firstSegment}/` : '/';
      const redirect = `${location.origin}${path}${location.search}${location.hash}`;
      sessionStorage.setItem('spa-redirect', `${location.pathname}${location.search}${location.hash}`);
      location.replace(`${location.origin}${base}?redirect=${encodeURIComponent(redirect)}`);
    </script>
  </head>
  <body></body>
</html>
